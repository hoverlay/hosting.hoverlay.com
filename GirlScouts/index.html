<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Girl Scouts Reflection</title>
  <style>
    :root {
      --bg: #f0f8f4;
      --bg-alt: #e3f2ec;
      --accent: #2c8558;
      --accent-soft: #7bc99d;
      --text-main: #1a4d2e;
      --text-muted: #5a7a6b;
      --error: #8b3a3a;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.12);
      --radius-lg: 24px;
      --radius-pill: 999px;
      --transition-fast: 180ms ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Cormorant Garamond", "Georgia", "Times New Roman", serif;
      background: radial-gradient(circle at top, #f7fdf9 0, #e8f5ee 50%, #d9ede3 100%);
      color: var(--text-main);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(227, 242, 236, 0.96));
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 1px solid rgba(44, 133, 88, 0.22);
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }

    .title {
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .reflection-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-align: center;
    }

    .textarea-shell {
      position: relative;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(44, 133, 88, 0.35);
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      max-height: 140px;
      border: none;
      resize: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-main);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .helper-text {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 7px 13px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
      white-space: nowrap;
    }

    .btn-send {
      background: #2c8558;
      color: #ffffff;
      padding-inline: 18px;
      box-shadow: 0 8px 18px rgba(44, 133, 88, 0.28);
    }

    .btn-send:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(44, 133, 88, 0.32);
    }

    .btn-send:disabled {
      background: #a8c9ba;
      color: #f8fdf9;
      box-shadow: none;
      cursor: not-allowed;
    }

    .signature {
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Celebration overlay */
    .celebration-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(44, 133, 88, 0.15), rgba(123, 201, 157, 0.08));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 400ms ease-out;
      border-radius: 18px;
    }

    .celebration-overlay.show {
      opacity: 1;
    }

    .awesome-text {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 4px 20px rgba(44, 133, 88, 0.4);
      letter-spacing: 0.1em;
      animation: popIn 700ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      60% {
        transform: scale(1.15);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Confetti particles */
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      opacity: 0;
    }

    .confetti.animate {
      animation: confettiFall 1200ms ease-out forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 1;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" aria-label="Reflection input">
    <header class="header">
      <div class="title">The Next Chapter Begins With You!</div>
      <!-- <div class="subtitle"></div> -->
    </header>

    <main class="content">
      <section class="reflection-panel" aria-label="Reflection input">
        <div class="field-label">Answer one of the following:</div>
        <div class="textarea-shell">
          <textarea
            id="reflectionInput"
            placeholder="How will you lead...?
Who will you help...?
What will you explore...?"
            aria-label="Reflection text"
          ></textarea>
          <div class="helper-text">
            <span>(Tap to type)</span>
          </div>
        </div>

        <div class="controls-row">
          <button id="sendButton" class="btn btn-send" type="button">
            Submit
          </button>
        </div>

        <div class="signature">
          Your thoughts are private.<br>
          They are not stored anywhere.
          <!-- Your words are private here and will be joined symbolically with many others. -->
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const reflectionInput = document.getElementById('reflectionInput');
      const sendButton = document.getElementById('sendButton');

      // --- Send / Submit reflection ---
      sendButton.addEventListener('click', function () {
        const text = (reflectionInput.value || '').trim();

        // Show celebration effect
        showCelebration();

        // Clear the text and send event to Unity
        setTimeout(() => {
          reflectionInput.value = '';
          location.href = `space://do?action=send_event&event_message=sent&when_done=hide`;
        }, 1200);
      });

      function showCelebration() {
        // Find the textarea shell to position overlay over it
        const textareaShell = document.querySelector('.textarea-shell');

        // Create overlay
        const overlay = document.createElement('div');
        overlay.className = 'celebration-overlay';

        // Create AWESOME text
        const awesomeText = document.createElement('div');
        awesomeText.className = 'awesome-text';
        awesomeText.textContent = 'AWESOME!';
        overlay.appendChild(awesomeText);

        // Create confetti particles that pop all around
        const colors = ['#2c8558', '#7bc99d', '#f0f8f4', '#e3f2ec', '#5a7a6b'];
        for (let i = 0; i < 30; i++) {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.left = '50%';
          confetti.style.top = '50%';

          // Random direction from center
          const angle = Math.random() * Math.PI * 2;
          const distance = 150 + Math.random() * 250;
          const tx = Math.cos(angle) * distance;
          const ty = Math.sin(angle) * distance;

          confetti.style.setProperty('--tx', tx + 'px');
          confetti.style.setProperty('--ty', ty + 'px');
          confetti.style.animationDelay = Math.random() * 100 + 'ms';
          confetti.style.animationDuration = 800 + Math.random() * 400 + 'ms';
          overlay.appendChild(confetti);
        }

        textareaShell.appendChild(overlay);

        // Trigger animations
        setTimeout(() => {
          overlay.classList.add('show');
          overlay.querySelectorAll('.confetti').forEach(c => c.classList.add('animate'));
        }, 10);

        // Remove overlay after animation
        setTimeout(() => {
          overlay.classList.remove('show');
          setTimeout(() => overlay.remove(), 400);
        }, 3000);
      }

    })();
  </script>
</body>
</html>
